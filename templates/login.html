<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Farmer App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">🌾</div>
            <div>
                <h1>Farmer App</h1>
                <p>Choose login mode and sign in to continue.</p>
            </div>
        </div>

        <div class="role-selector">
            <button type="button" class="role-btn active" data-role="farmer">Farmer</button>
            <button type="button" class="role-btn" data-role="customer">Customer</button>
        </div>

        {% if success %}
            <div class="success-message">✅ {{ success }}</div>
        {% endif %}

        <form method="POST" class="form login-form">
            <input type="hidden" id="login_role" name="role" value="farmer">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="/register">Register here</a></p>
        </div>
    </div>
</div>

<script>
    const roleButtons = document.querySelectorAll('.role-btn');
    const roleInput = document.getElementById('login_role');

    roleButtons.forEach(button => {
        button.addEventListener('click', () => {
            roleButtons.forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            roleInput.value = button.dataset.role;
        });
    });
</script>

</body>
</html>
